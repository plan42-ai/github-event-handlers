name: PR

on:
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.2'

    - name: Configure Git to use GITHUB_TOKEN
      run: |
        git config --global url."https://${{ secrets.PRIVATE_REPO_PULL_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Build
      run: make build

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        version: v2.12.2

    - name: Test
      run: make test
